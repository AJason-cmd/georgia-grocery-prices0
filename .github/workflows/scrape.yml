- name: Commit prices.xlsx
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f prices.xlsx || echo "No xlsx to commit"
          git diff --staged --quiet || git commit -m "prices $(date +'%Y-%m-%d')" && git push || echo "Nothing to push"
